<meta charset="UTF-8">
<meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<title>{{ site.title }}</title>
<link rel="canonical" href="{{ site.url }}{{ page.url }}">
<link rel="icon" type="image/png" href="{{site.logo}}" hreflang="en-us">
<link rel="alternate" type="application/rss+xml" title="Naeem Hossain &mdash; Writing" href="{{ site.url }}/feed.xml">
{% for link in site.social %}{% if link.title == 'github' or link.title == 'linkedin' %}<link rel="me" href="{{ link.url }}">
{% endif %}{% endfor %}<meta property="og:title" content="{{site.title}}" />
<meta property="og:description" content="{{site.description}}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{site.url}}" />
<meta property="og:site_name" content="{{site.name}}" />
<meta property="og:image" content="{{site.cover}}" />
<meta property="og:image:width" content="1280" />
<meta property="og:image:height" content="800" />
<meta property="og:image:type" content="image/png" />
<meta property="og:locale" content="en_US">
<meta name="description" content="{{site.description}}">
<meta name="keywords" content="naeemh, naeem, hossain, systems engineer, azure, kubernetes, terraform, ai, sre, microsoft, new york, devops, copilot, microsoft advertising">
<meta itemprop="name" content="{{site.title}}">
<meta itemprop="description" content="{{site.description}}">
<meta itemprop="image" content="{{site.cover}}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Naeem Hossain",
  "givenName": "Naeem",
  "familyName": "Hossain",
  "jobTitle": "Senior Software Engineer",
  "worksFor": {
    "@type": "Organization",
    "name": "Microsoft AI",
    "url": "https://www.microsoft.com/en-us/ai"
  },
  "description": "Naeem Hossain - Senior Software Engineer at Microsoft AI",
  "url": "{{site.url}}",
  "image": "{{site.cover}}",
  "email": "{{site.email}}",
  "alumniOf": {
    "@type": "CollegeOrUniversity",
    "name": "Rutgers University - New Brunswick",
    "url": "https://www.cs.rutgers.edu/"
  },
  "sameAs": [
    "https://github.com/NaeemH",
    "https://www.linkedin.com/in/naeem-hossain"
  ]
}
</script>
