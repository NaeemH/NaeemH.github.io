<div style="padding: 0% 4% 4% 4%;">
<footer class="footer">
  <div class="footer__copyright">
    <div class="top">
      <span>Inspired by</span>
    </div>
    <div class="bottom">
      <span>
        <a href="https://github.com/bchiang7" target="_blank" class="highlight-link">Brittany Chiang</a>
      </span>
      <img class="emoji" src="{{site.baseurl}}/img/emojis/rockon.png" alt="emoji">
      <span>{{ 'now' | date: '%Y' }}</span>
    </div>
  </div>
  <div class="footer__links">
    {% for link in site.social %}
    <a href="{{link.url}}" target="_blank" title="{{link.title}}">
      <span class="text">{{link.title}}</span>
      <img src="{{site.baseurl}}/img/social/{{link.title}}.svg" alt="{{link.title}}" width="22" height="22">
    </a>
    {% endfor %}
    {% if site.photography %}
    <a href="{{ site.photography }}" target="_blank" rel="noopener" title="photography">
      <span class="text">photography</span>
      <img src="{{site.baseurl}}/img/social/photography.svg" alt="photography" width="22" height="22">
    </a>
    {% endif %}
  </div>
</footer>
</div>
