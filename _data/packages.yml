- name: azkv-ssh-fetch
  description: Python CLI that pulls SSH private keys from Azure Key Vault and connects to VMs / VMSS instances through Azure Bastion. Atomic key writes with mode 0600, optional key shred on disconnect, full <code>az</code> CLI integration.
  install: pipx install azkv-ssh-fetch
  links:
    - label: PyPI
      url: https://pypi.org/project/azkv-ssh-fetch/
    - label: GitHub
      url: https://github.com/NaeemH/azkv-ssh-fetch
  used:
    - thing: Python
    - thing: Typer
    - thing: Azure SDK
    - thing: Azure Key Vault
    - thing: Azure Bastion

- name: avnm-pool-cidr
  description: Python CLI that picks the next free CIDR prefix from an Azure Virtual Network Manager IPAM pool, plus subcommands to list pool reservations and report per-prefix utilization. Removes the manual portal arithmetic.
  install: pipx install avnm-pool-cidr
  links:
    - label: PyPI
      url: https://pypi.org/project/avnm-pool-cidr/
    - label: GitHub
      url: https://github.com/NaeemH/avnm-pool-cidr
  used:
    - thing: Python
    - thing: Typer
    - thing: Azure CLI
    - thing: Azure Virtual Network Manager
    - thing: IPAM

- name: azaks-conn
  description: Python CLI that fetches AKS kubeconfigs via <code>az aks get-credentials</code> and merges them into <code>~/.kube/config</code> under a short alias. Tracks cluster / RG / subscription / admin metadata in a state file so <code>refresh</code>, <code>list</code>, <code>verify</code>, and <code>rm</code> work without retyping arguments. Admin (cluster-certificate) contexts are clearly flagged in <code>list</code> and re-warned on <code>verify</code> so they aren't accidentally shared.
  install: pipx install azaks-conn
  links:
    - label: PyPI
      url: https://pypi.org/project/azaks-conn/
    - label: GitHub
      url: https://github.com/NaeemH/azaks-conn
  used:
    - thing: Python
    - thing: Typer
    - thing: Rich
    - thing: Azure CLI
    - thing: AKS
    - thing: kubectl
