# Photography portfolio link — shows a "photography" icon in the intro + footer
# social rows once a URL is set. Point it at your public gallery/profile
# (Instagram, Flickr, a Google Photos shared album, a portfolio host, etc.).
# Leave empty to keep the link hidden; no photos are uploaded to this repo.
photography:

# Build settings
markdown: kramdown

# Jekyll skips dot-folders by default; include .well-known so
# /.well-known/security.txt (RFC 9116) is published.
include:
  - '.well-known'

exclude:
  - 'Gemfile'
  - 'Gemfile.lock'
  - '*.gemspec'
  - 'README.md'
  - 'vendor'
  - '.github'

keep_files:
  - 'CNAME'
  - '.git'
  - '.gitignore'

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Permalink for posts: /writing/<slug>/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /writing/:slug/

# RSS feed (jekyll-feed)
feed:
  path: feed.xml
